{% include 'layout.html' %}

<div class="container">
    <div class="row justify-content-center align-items-center" style="height:100vh;">

        <div class="col-md-5">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h3 class="text-center mb-4">Register</h3>

                    <form id="registerForm">

                        <!-- Email -->
                        <div class="form-group">
                            <input type="email"
                                   class="form-control"
                                   name="email"
                                   placeholder="Email"
                                   required>
                        </div>

                        <!-- Username -->
                        <div class="form-group">
                            <input type="text"
                                   class="form-control"
                                   name="username"
                                   placeholder="Username"
                                   required>
                        </div>

                        <!-- First Name -->
                        <div class="form-group">
                            <input type="text"
                                   class="form-control"
                                   name="firstname"
                                   placeholder="First Name"
                                   required>
                        </div>

                        <!-- Last Name -->
                        <div class="form-group">
                            <input type="text"
                                   class="form-control"
                                   name="lastname"
                                   placeholder="Last Name"
                                   required>
                        </div>

                        <!-- Password -->
                        <div class="form-group">
                            <input type="password"
                                   class="form-control"
                                   name="password"
                                   placeholder="Password"
                                   required>
                        </div>

                        <!-- Verify Password -->
                        <div class="form-group">
                            <input type="password"
                                   class="form-control"
                                   name="password2"
                                   placeholder="Verify Password"
                                   required>
                        </div>

                        <!-- Role -->
                        <div class="form-group">
                            <input type="text"
                                   class="form-control"
                                   name="role"
                                   placeholder="Role"
                                   required>
                        </div>

                        <!-- Phone Number -->
                        <div class="form-group">
                            <input type="text"
                                   class="form-control"
                                   name="phone_number"
                                   placeholder="Phone Number"
                                   required>
                        </div>

                        <!-- Submit -->
                        <button type="submit"
                                class="btn btn-primary btn-block">
                            Register
                        </button>

                    </form>

                    <!-- Login Link -->
                    <p class="text-center mt-3 mb-0">
                        Already have an account?
                        <a href="/auth/login-page">Login</a>
                    </p>

                </div>
            </div>

        </div>

    </div>
</div>
